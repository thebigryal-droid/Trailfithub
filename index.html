<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryal FitHub | Pro Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #c3f53c; --primary-dark: #a2d620; --bg: #f4f5f7; --card: #ffffff; --text: #0f172a; --text-muted: #64748b; --border: #e2e8f0; --danger: #ef4444; --info: #3b82f6; --warning: #f59e0b; }
        body.dark-mode { --bg: #09090b; --card: #141417; --text: #f8fafc; --text-muted: #94a3b8; --border: #27272a; }
        body { margin:0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 0; transition: background 0.4s, color 0.4s; overflow-x: hidden; }
        #cloudLoader { position: fixed; inset: 0; background: var(--bg); z-index: 50000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #appContainer { padding: 20px 15px 80px; display: none; }
        header { text-align: center; margin-bottom: 25px; }
        .trainer-badge { display: inline-block; background: rgba(195, 245, 60, 0.2); color: var(--primary-dark); padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .section { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 18px; border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 18px 8px; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; }
        .stat-val { display: block; font-size: 18px; font-weight: 800; margin-top: 8px; }
        h2 { font-size: 12px; text-transform: uppercase; display: flex; justify-content: space-between; cursor: pointer; font-weight: 800; }
        .collapsible { display: none; padding-top: 18px; margin-top: 15px; border-top: 1px solid var(--border); }
        .active .collapsible { display: block; }
        input, select { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; background: var(--bg); color: var(--text); outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: #0f172a; }
        .btn-sub { background: var(--bg); color: var(--text); font-size: 12px; border: 1px solid var(--border); padding: 10px 14px; width: auto; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-info { background: var(--info); color: white; }
        .history-pane { background: var(--bg); padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin-top: 5px; }
        .history-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        #authView { position: fixed; inset: 0; background: #09090b; z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #141417; border: 1px solid #27272a; border-radius: 24px; padding: 30px 20px; width: 100%; max-width: 360px; text-align: center; }
        .auth-grid { display: flex; gap: 10px; }
        #clientOverlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 5000; padding: 20px; overflow-y: auto; }
        footer.app-footer { text-align: center; padding: 30px 10px; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border); font-weight: 800; }
    </style>
</head>
<body id="mainBody" class="dark-mode">

<div id="cloudLoader"><div class="spinner"></div>Loading Ryal FitHub...</div>

<div id="authView">
    <div class="auth-card" id="loginBlock">
        <h2 style="color:white">Ryal FitHub Cloud</h2>
        <p style="color:#94a3b8">Sign in to sync your trainer profile.</p>
        <button class="btn-main" onclick="ryalSignIn()">Sign in with Google</button>
    </div>
    <div class="auth-card" id="setupBlock" style="display:none">
        <h2 style="color:white">Trainer Setup</h2>
        <input type="text" id="authName" placeholder="Full Name">
        <input type="number" id="authSalary" placeholder="Monthly Salary (₹)">
        <div class="auth-grid"><input type="time" id="authIn" value="06:00"><input type="time" id="authOut" value="14:00"></div>
        <button class="btn-main" onclick="saveTrainerProfile()">Start Coaching</button>
    </div>
</div>

<div id="appContainer">
    <header>
        <h1>Ryal FitHub</h1>
        <span class="trainer-badge" id="headerTrainerName">Portal</span>
        <div style="margin-top:15px; display:flex; justify-content:center; gap:8px;">
            <button class="btn-sub" onclick="toggleTheme()">Theme</button>
            <button class="btn-sub" onclick="editTrainerProfile()">Profile</button>
            <button class="btn-sub" onclick="ryalSignOut()">Logout</button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><span class="stat-label">Sessions</span><span id="statSessions" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-label">Shift</span><span id="statShift" class="stat-val">-</span></div>
        <div class="stat-card"><span class="stat-label">Earnings</span><span id="statRevenue" class="stat-val">₹0</span></div>
    </div>

    <div class="section active" id="sec-plan">
        <h2 onclick="toggleSec('sec-plan')">Planner <i class="fa fa-chevron-down"></i></h2>
        <div class="collapsible">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px"><span>Est. Earnings:</span><span id="planEarnings">₹0</span></div>
            <select id="planClient"></select>
            <div class="auth-grid"><input type="date" id="planDate"><input type="time" id="planTime"></div>
            <input type="text" id="planWorkout" placeholder="Workout focus">
            <button class="btn-main" onclick="addPlan()">Schedule Session</button>
            <div id="planList" class="history-pane"></div>
        </div>
    </div>

    <div class="section active" id="sec-rost">
        <h2 onclick="toggleSec('sec-rost')">Roster <i class="fa fa-chevron-down"></i></h2>
        <div class="collapsible">
            <table style="width:100%"><thead><tr><th>Name</th><th>Slot</th><th>Done</th><th>Action</th></tr></thead><tbody id="rosterView"></tbody></table>
        </div>
    </div>

    <div class="section" id="sec-prof">
        <h2 onclick="toggleSec('sec-prof')">Register Client <i class="fa fa-chevron-down"></i></h2>
        <div class="collapsible">
            <input type="text" id="regName" placeholder="Client Name">
            <div class="auth-grid"><input type="number" id="regSess" placeholder="Total Sessions"><input type="number" id="regPay" placeholder="Package Price"></div>
            <input type="time" id="regSlot">
            <button class="btn-main" onclick="regClient()">Add to Roster</button>
        </div>
    </div>

    <footer class="app-footer">RYAL FITHUB | <span id="footerTrainerName"></span></footer>
</div>

<div id="clientOverlay">
    <button class="btn-sub" onclick="document.getElementById('clientOverlay').style.display='none'">Back</button>
    <h1 id="ovName" style="margin:20px 0 10px 0"></h1>
    <div class="section active">
        <h2>Record Workout</h2>
        <input type="date" id="logDate">
        <input type="text" id="logWorkoutName" placeholder="Workout (e.g. Chest)">
        <button class="btn-main" onclick="quickLog()">Log Session Done</button>
    </div>
    <div class="section active">
        <h2>Progress Report</h2>
        <button class="btn-info" onclick="generateProgressPDF()">Print PDF</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBg9h_yMnIc0xLFWsu8AivB_oJHOHTuqvw",
      authDomain: "ryalfithub.firebaseapp.com",
      projectId: "ryalfithub",
      storageBucket: "ryalfithub.firebasestorage.app",
      messagingSenderId: "539542106057",
      appId: "1:539542106057:web:edebd1bb70919137dd8218"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    window.trainerProfile = null;
    window.clients = [];
    window.plans = [];
    window.shifts = [];

    // --- AUTH LOGIC ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const docSnap = await getDoc(doc(db, "trainers", user.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                window.trainerProfile = data.profile;
                window.clients = data.clients || [];
                window.plans = data.plans || [];
                window.shifts = data.shifts || [];
                document.getElementById('cloudLoader').style.display = 'none';
                initApp();
            } else {
                document.getElementById('cloudLoader').style.display = 'none';
                document.getElementById('authView').style.display = 'flex';
                document.getElementById('loginBlock').style.display = 'none';
                document.getElementById('setupBlock').style.display = 'block';
            }
        } else {
            document.getElementById('cloudLoader').style.display = 'none';
            document.getElementById('authView').style.display = 'flex';
        }
    });

    window.ryalSignIn = () => signInWithPopup(auth, new GoogleAuthProvider());
    window.ryalSignOut = () => signOut(auth).then(() => location.reload());

    window.saveTrainerProfile = async () => {
        const profile = {
            name: document.getElementById('authName').value,
            salary: parseFloat(document.getElementById('authSalary').value) || 0,
            shiftIn: document.getElementById('authIn').value,
            shiftOut: document.getElementById('authOut').value
        };
        if(!profile.name) return alert("Name required");
        window.trainerProfile = profile;
        await syncToCloud();
        initApp();
    };

    const initApp = () => {
        document.getElementById('authView').style.display = 'none';
        document.getElementById('appContainer').style.display = 'block';
        document.getElementById('headerTrainerName').innerText = window.trainerProfile.name;
        document.getElementById('footerTrainerName').innerText = window.trainerProfile.name;
        render();
    };

    const syncToCloud = async () => {
        if (!currentUser) return;
        await setDoc(doc(db, "trainers", currentUser.uid), {
            profile: window.trainerProfile,
            clients: window.clients,
            plans: window.plans,
            shifts: window.shifts
        });
    };

    // --- APP LOGIC ---
    window.render = () => {
        // Planner
        const pClient = document.getElementById('planClient');
        pClient.innerHTML = '<option value="">Select Client</option>' + window.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        
        let totalPlan = 0;
        document.getElementById('planList').innerHTML = window.plans.map(p => {
            let c = window.clients.find(x => x.id == p.clientId);
            if(!c) return '';
            totalPlan += (c.pay / c.sess) * 0.4;
            return `<div class="history-row"><span>${c.name} - ${p.date}</span><button onclick="completePlan(${p.id})">Done</button></div>`;
        }).join('') || 'No sessions';
        document.getElementById('planEarnings').innerText = "₹" + totalPlan.toFixed(0);

        // Roster
        document.getElementById('rosterView').innerHTML = window.clients.map(c => {
            let done = Object.keys(c.logs || {}).length;
            return `<tr><td onclick="openOv(${c.id})"><b>${c.name}</b></td><td>${c.slot}</td><td>${done}/${c.sess}</td><td><button onclick="openOv(${c.id})">View</button></td></tr>`;
        }).join('');
    };

    window.addPlan = async () => {
        const p = { id: Date.now(), clientId: document.getElementById('planClient').value, date: document.getElementById('planDate').value, workout: document.getElementById('planWorkout').value };
        if(!p.clientId || !p.date) return alert("Missing info");
        window.plans.push(p);
        await syncToCloud(); render();
    };

    window.completePlan = async (id) => {
        const p = window.plans.find(x => x.id === id);
        const c = window.clients.find(x => x.id == p.clientId);
        if(!c.logs) c.logs = {};
        c.logs[p.date] = { name: p.workout };
        window.plans = window.plans.filter(x => x.id !== id);
        await syncToCloud(); render();
    };

    window.regClient = async () => {
        const c = { id: Date.now(), name: document.getElementById('regName').value, sess: parseInt(document.getElementById('regSess').value), pay: parseFloat(document.getElementById('regPay').value), slot: document.getElementById('regSlot').value, logs: {} };
        window.clients.push(c);
        await syncToCloud(); render();
    };

    window.openOv = (id) => {
        window.curID = id;
        const c = window.clients.find(x => x.id === id);
        document.getElementById('ovName').innerText = c.name;
        document.getElementById('clientOverlay').style.display = 'block';
    };

    window.quickLog = async () => {
        const date = document.getElementById('logDate').value;
        const c = window.clients.find(x => x.id === window.curID);
        if(!date) return alert("Select Date");
        if(!c.logs) c.logs = {};
        c.logs[date] = { name: document.getElementById('logWorkoutName').value };
        await syncToCloud(); render();
        alert("Session Logged!");
    };

    window.generateProgressPDF = () => {
        const c = window.clients.find(x => x.id === window.curID);
        const win = window.open('', '_blank');
        win.document.write('<html><body><h1>Client: ' + c.name + '</h1><p>Sessions Completed: ' + Object.keys(c.logs).length + '</p></body></html>');
        win.document.close();
        win.print();
    };

    window.toggleSec = (id) => document.getElementById(id).classList.toggle('active');
    window.toggleTheme = () => document.body.classList.toggle('dark-mode');
</script>
</body>
</html>
